name: Kubernetes CD (Simple)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build JAR with Maven
        run: mvn clean package

      - name: Build Docker image
        run: docker build -t java-hello:latest .

      # ✅ Create kind cluster (default name: kind)
      - name: Create Kubernetes cluster
        uses: helm/kind-action@v1.10.0

      # ✅ Load image into the SAME cluster
      - name: Load image into kind
        run: kind load docker-image java-hello:latest

      - name: Deploy to Kubernetes
        run: |
          kubectl apply -f k8s/
          kubectl get pods